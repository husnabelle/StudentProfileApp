<!DOCTYPE html>
<html>
<head>
    <title>Fill Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body style="background-color:#f5f5f5;">
<div class="container mt-5">
    <h2 class="text-center mb-4">Fill in Your Profile</h2>
    <form action="PersonalServlet" method="post" class="mx-auto" style="max-width:600px;">
        <div class="mb-3">
            <label class="form-label">Student ID:</label>
            <input type="text" name="studentId" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Name:</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Programme:</label>
            <input type="text" name="program" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email:</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Hobbies:</label>
            <input type="text" name="hobbies" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Introduction:</label>
            <textarea name="intro" class="form-control"></textarea>
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-success btn-lg">Submit</button>
        </div>
    </form>
</div>
</body>
</html>
